name: Telegram channel news radar

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: news-radar-state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      KSKILL_PROXY_BASE_URL: ${{ secrets.KSKILL_PROXY_BASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      SEND_TELEGRAM: ${{ secrets.SEND_TELEGRAM || '1' }}
      MIN_SEND_IMPORTANCE: ${{ secrets.MIN_SEND_IMPORTANCE || '4' }}
      STAGE1_MODEL: ${{ secrets.STAGE1_MODEL }}
      STAGE2_MODEL: ${{ secrets.STAGE2_MODEL }}
      RUN_ONCE: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Run Telegram channel radar
        run: python3 -m news_radar.worker --source tgchannel
      - name: Commit state
        if: always()
        run: |
          if [ ! -d data ]; then
            echo "No data directory"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data prompts; then
            echo "No state changes"
            exit 0
          fi
          git add data prompts
          git commit -m "Update news radar state"
          for i in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase && git push; then
              exit 0
            fi
            if git status --porcelain | grep -Eq '^(AA|AU|UA|DU|UD|UU) data/monitor\.sqlite3'; then
              git checkout --theirs data/monitor.sqlite3
              git add data/monitor.sqlite3
              GIT_EDITOR=true git rebase --continue && git push && exit 0
            fi
            sleep 5
          done
          exit 1
