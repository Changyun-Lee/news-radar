name: Distill criteria

on:
  schedule:
    - cron: "0 21 * * 0"
  workflow_dispatch:

concurrency:
  group: news-radar-state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      STAGE2_MODEL: ${{ secrets.STAGE2_MODEL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Distill criteria
        run: python -m news_radar.distill
      - name: Commit criteria
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data prompts; then
            echo "No criteria changes"
            exit 0
          fi
          git add data prompts
          git commit -m "Distill news radar criteria"
          for i in 1 2 3; do
            git pull --rebase && git push && exit 0
            sleep 5
          done
          exit 1

