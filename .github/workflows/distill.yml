name: Distill criteria

on:
  schedule:
    - cron: "0 21 * * 0"
  workflow_dispatch:

concurrency:
  group: news-radar-state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      STAGE2_MODEL: ${{ secrets.STAGE2_MODEL }}
    steps:
      - uses: actions/checkout@v4
      - name: Distill criteria
        run: python3 -m news_radar.distill
      - name: Commit criteria
        if: always()
        run: |
          if [ ! -d data ]; then
            echo "No data directory"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data prompts; then
            echo "No criteria changes"
            exit 0
          fi
          git add data prompts
          git commit -m "Distill news radar criteria"
          for i in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase && git push; then
              exit 0
            fi
            if git status --porcelain | grep -Eq '^(AA|AU|UA|DU|UD|UU) data/monitor\.sqlite3'; then
              git checkout --theirs data/monitor.sqlite3
              git add data/monitor.sqlite3
              GIT_EDITOR=true git rebase --continue && git push && exit 0
            fi
            sleep 5
          done
          exit 1

